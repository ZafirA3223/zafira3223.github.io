<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academic Files</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#111118;--surface2:#18181f;--border:#ffffff0f;--border2:#ffffff1a;
  --accent:#6c63ff;--accent2:#a78bfa;--text:#f0eeff;--muted:#7b7898;--dim:#3d3a58;
  --teal:#2dd4bf;--font:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
.header{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,var(--bg) 70%,transparent);padding:1.25rem 2rem .75rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.logo{font-size:1.05rem;font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,var(--accent2),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.logo span{font-weight:400;opacity:.5;font-size:.85em}
.stats-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-left:auto}
.stat{font-family:var(--mono);font-size:.68rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px 8px}
.stat b{color:var(--accent2)}
.search-wrap{padding:0 2rem .75rem;position:relative}
.search-icon{position:absolute;left:3rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
#search{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:var(--font);font-size:.9rem;padding:.6rem 1rem .6rem 2.5rem;outline:none;transition:border-color .2s}
#search::placeholder{color:var(--muted)}
#search:focus{border-color:var(--accent)}
.filter-strip{display:flex;gap:.5rem;padding:0 2rem 1rem;overflow-x:auto;scrollbar-width:none}
.filter-strip::-webkit-scrollbar{display:none}
.pill{font-family:var(--mono);font-size:.68rem;white-space:nowrap;cursor:pointer;padding:3px 10px;border-radius:999px;border:1px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s}
.pill:hover{border-color:var(--dim);color:var(--text)}
.pill.on{background:var(--accent);border-color:var(--accent);color:#fff}
.layout{display:grid;grid-template-columns:250px 1fr;min-height:calc(100vh - 150px)}
.sidebar{position:sticky;top:120px;height:calc(100vh - 120px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--dim) transparent;border-right:1px solid var(--border);padding:.75rem 0;background:var(--surface)}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
.sem-group{margin-bottom:.25rem}
.sem-label{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:.5rem 1.25rem .2rem;display:flex;align-items:center;gap:.5rem}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.course-link{display:flex;align-items:center;gap:.5rem;padding:.38rem 1.25rem;font-size:.8rem;color:var(--muted);cursor:pointer;transition:all .15s;border-left:2px solid transparent;text-decoration:none;line-height:1.3}
.course-link:hover{color:var(--text);background:var(--surface2)}
.course-link.active{color:var(--accent2);border-left-color:var(--accent);background:var(--surface2)}
.main{padding:1.5rem 2rem;min-width:0}
.sem-section{margin-bottom:2.5rem}
.sem-bar{width:36px;height:2px;border-radius:2px;margin-bottom:1rem;opacity:.7}
.sem-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid var(--border)}
.sem-title{font-size:1.3rem;font-weight:700;letter-spacing:-.03em}
.sem-meta{font-family:var(--mono);font-size:.68rem;color:var(--muted)}
.course-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:.75rem;overflow:hidden}
.course-card:hover{border-color:var(--border2)}
.card-head{display:flex;align-items:center;gap:.7rem;padding:.8rem 1.1rem;cursor:pointer;user-select:none;background:var(--surface2)}
.card-head:hover{background:#1c1c24}
.card-icon{font-size:1rem;width:24px;text-align:center;flex-shrink:0}
.card-name{font-size:.88rem;font-weight:600;flex:1;letter-spacing:-.01em}
.card-count{font-family:var(--mono);font-size:.63rem;color:var(--muted)}
.chevron{color:var(--dim);transition:transform .2s;font-size:.65rem;flex-shrink:0}
.course-card.open .chevron{transform:rotate(90deg)}
.card-body{display:none;padding:.4rem .4rem .75rem}
.course-card.open .card-body{display:block}
.ag-label{font-family:var(--mono);font-size:.6rem;color:var(--dim);padding:.35rem .7rem .15rem;letter-spacing:.05em;text-transform:uppercase}
.file-row{display:flex;align-items:center;gap:.55rem;padding:.3rem .7rem;border-radius:7px;cursor:pointer;transition:background .12s}
.file-row:hover{background:var(--surface2)}
.ext-badge{font-family:var(--mono);font-size:.58rem;font-weight:500;padding:1px 5px;border-radius:4px;min-width:30px;text-align:center;flex-shrink:0}
.fname{font-size:.78rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fsize{font-family:var(--mono);font-size:.62rem;color:var(--muted);flex-shrink:0}
.fdl{font-size:.6rem;color:var(--dim);flex-shrink:0;opacity:0;transition:opacity .12s}
.file-row:hover .fdl{opacity:1}
.ep{background:#ff443320;color:#ff7055}
.ed{background:#2563eb20;color:#60a5fa}
.ej{background:#d9770620;color:#fbbf24}
.ec{background:#4ade8020;color:#4ade80}
.ez{background:#a78bfa20;color:#a78bfa}
.ev{background:#f472b620;color:#f472b6}
.es{background:#fb923c20;color:#fb923c}
.ex{background:#22d3ee20;color:#22d3ee}
.eh{background:#f59e0b20;color:#f59e0b}
.e_{background:#ffffff0f;color:var(--muted)}
.empty{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty big{display:block;font-size:2rem;margin-bottom:.5rem}
.modal-bg{position:fixed;inset:0;background:#00000099;z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:1.5rem;max-width:480px;width:100%}
.modal-path{font-family:var(--mono);font-size:.68rem;color:var(--dim);background:var(--surface2);border-radius:7px;padding:.65rem .85rem;margin:.75rem 0;word-break:break-all;line-height:1.7}
.modal-note{font-size:.78rem;color:var(--muted);line-height:1.6}
code{background:var(--surface2);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:.75em}
@media(max-width:680px){.layout{grid-template-columns:1fr}.sidebar{display:none}.header,.search-wrap,.filter-strip{padding-left:1rem;padding-right:1rem}.main{padding:1rem}}
</style>
</head>

const SC={FA22:'#4ade80',SP23:'#34d399',FA23:'#fb923c',SP24:'#fbbf24',FA24:'#f472b6',SP25:'#60a5fa',SU25:'#2dd4bf',FA25:'#a78bfa',SP26:'#6c63ff'};
function fmtSz(b){if(b<1024)return b+'B';if(b<1048576)return Math.round(b/1024)+'KB';return (b/1048576).toFixed(1)+'MB';}
function extCls(e){const m={pdf:'ep',docx:'ed',doc:'ed',jpg:'ej',jpeg:'ej',png:'ej',py:'ec',java:'ec',cpp:'ec',m:'ec',ipynb:'ec',zip:'ez',mp4:'ev',mkv:'ev',pptx:'es',xlsx:'ex',xls:'ex',html:'eh'};return m[e]||'e_';}
function mkId(sid,cn){return 'c'+btoa(unescape(encodeURIComponent(sid+cn))).replace(/[^a-z0-9]/gi,'').slice(0,20);}

function buildSB(sf,q){
  let h='';
  for(const [sid,sem] of Object.entries(T)){
    if(sf!=='ALL'&&sid!==sf)continue;
    let ch='';
    for(const [cn,cd] of Object.entries(sem.courses)){
      if(q){const ql=q.toLowerCase();const ok=cn.toLowerCase().includes(ql)||Object.entries(cd.assignments).some(([a,fs])=>a.toLowerCase().includes(ql)||fs.some(f=>f.filename.toLowerCase().includes(ql)));if(!ok)continue;}
      const id=mkId(sid,cn);
      ch+=`<a class="course-link" href="#${id}" onclick="jump('${id}');return false"><span style="font-size:.9rem;width:18px;text-align:center;flex-shrink:0">${cd.icon}</span><span style="flex:1">${cn}</span></a>`;
    }
    if(!ch)continue;
    const c=SC[sid]||'#888';
    h+=`<div class="sem-group"><div class="sem-label"><span class="dot" style="background:${c}"></span>${sem.label}</div>${ch}</div>`;
  }
  document.getElementById('sb').innerHTML=h||'<div style="padding:1rem;font-size:.8rem;color:var(--muted)">No results</div>';
}

function buildMain(sf,q){
  let h='';let tot=0;
  for(const [sid,sem] of Object.entries(T)){
    if(sf!=='ALL'&&sid!==sf)continue;
    let cards='';let sc=0;
    for(const [cn,cd] of Object.entries(sem.courses)){
      let abody='';let cc=0;
      for(const [an,files] of Object.entries(cd.assignments)){
        let fh='';
        for(const file of files){
          if(q){const ql=q.toLowerCase();if(!file.filename.toLowerCase().includes(ql)&&!cn.toLowerCase().includes(ql)&&!an.toLowerCase().includes(ql))continue;}
          const cl=extCls(file.ext);
          const row=document.createElement('div');
          row.className='file-row';
          row.dataset.path=file.path;
          row.dataset.name=file.filename;
          row.innerHTML=`<span class="ext-badge ${cl}">${file.ext||'?'}</span><span class="fname" title="${file.filename.replace(/"/g,'&quot;')}">${file.filename}</span><span class="fsize">${fmtSz(file.size)}</span><span class="fdl">&#8595;</span>`;
          fh+=row.outerHTML;
          cc++;
        }
        if(!fh)continue;
        abody+=`<div>${an!=='(root)'?`<div class="ag-label">${an}</div>`:''}${fh}</div>`;
      }
      if(!abody)continue;
      const id=mkId(sid,cn);
      const op=q?'open':'';
      cards+=`<div class="course-card ${op}" id="${id}"><div class="card-head" onclick="this.parentElement.classList.toggle('open')"><span class="card-icon">${cd.icon}</span><span class="card-name">${cn}</span><span class="card-count">${cc} files</span><span class="chevron">&#9654;</span></div><div class="card-body">${abody}</div></div>`;
      sc+=cc;
    }
    if(!cards)continue;
    const c=SC[sid]||'#888';
    const nc=(cards.match(/class="course-card/g)||[]).length;
    h+=`<section class="sem-section" id="s${sid}"><div class="sem-bar" style="background:${c}"></div><div class="sem-header"><span class="dot" style="background:${c};width:8px;height:8px;border-radius:50%"></span><span class="sem-title">${sem.label}</span><span class="sem-meta">${nc} courses &middot; ${sc} files</span></div>${cards}</section>`;
    tot+=sc;
  }
  document.getElementById('mn').innerHTML=h||'<div class="empty"><big>&#128269;</big>No files match.</div>';
  document.getElementById('sf').textContent=tot;
  // Re-attach click handlers to file rows
  document.querySelectorAll('.file-row').forEach(r=>{
    r.addEventListener('click',()=>showModal(r.dataset.path,r.dataset.name));
  });
}

function jump(id){
  const el=document.getElementById(id);
  if(el){el.scrollIntoView({behavior:'smooth',block:'start'});el.classList.add('open');document.querySelectorAll('.course-link').forEach(l=>l.classList.toggle('active',l.getAttribute('href')==='#'+id));}
}

function showModal(path,name){
  document.getElementById('modal')&&document.getElementById('modal').remove();
  const bg=document.createElement('div');bg.className='modal-bg';bg.id='modal';
  const box=document.createElement('div');box.className='modal-box';
  box.innerHTML=`<div style="display:flex;align-items:flex-start;gap:.75rem"><div style="flex:1"><div style="font-size:.7rem;font-family:var(--mono);color:var(--muted)">File</div><div style="font-size:.92rem;font-weight:600;margin-top:2px;word-break:break-all">${name}</div></div><button id="mc" style="background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:26px;height:26px;border-radius:5px;cursor:pointer;flex-shrink:0">&#215;</button></div><div class="modal-path">${path}</div><div class="modal-note">This file is at the path above inside your <code>academic_files/</code> folder.</div>`;
  bg.appendChild(box);
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove();});
  box.querySelector('#mc').addEventListener('click',()=>bg.remove());
  document.body.appendChild(bg);
}

let cur='ALL',qry='';
function render(){buildSB(cur,qry);buildMain(cur,qry);}

// Build filter pills
const strip=document.getElementById('fs');
for(const [sid,sem] of Object.entries(T)){
  const b=document.createElement('button');b.className='pill';b.dataset.sem=sid;b.textContent=sem.label;
  b.addEventListener('click',()=>{cur=sid;document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));b.classList.add('on');render();});
  strip.appendChild(b);
}
strip.querySelector('[data-sem="ALL"]').addEventListener('click',function(){cur='ALL';document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));this.classList.add('on');render();});

let st;document.getElementById('search').addEventListener('input',function(){clearTimeout(st);st=setTimeout(()=>{qry=this.value.trim();render();},220);});
render();

</script>
